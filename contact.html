<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar glass">
  <div class="container">
    <a href="index.html" class="navbar-brand">Nivedya</a>
  </div>
</nav>

<section class="container my-5">

<h2>Contact Me</h2>

<form onsubmit="sendMsg(event)">
  <input class="form-control mb-3" placeholder="Name" required>
  <input class="form-control mb-3" placeholder="Email" required>
  <textarea class="form-control mb-3" placeholder="Message"></textarea>
  <button class="btn btn-primary">Send</button>
</form>

<p id="msg" class="mt-3 text-success"></p>

</section>

<script src="script.js"></script>
</body>
</html>
